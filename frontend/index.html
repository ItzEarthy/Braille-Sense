<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Mobile App</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="app">

    <!--Company Name Header-->
    <header class="app-header">
      <h1>Braille Sense</h1>
    </header>

    <!--Everything else under company name-->
    <div id="main-view">
      <div id="setting-button">
        <img src="setting.png" alt="Settings Button">
      </div>

      <!--What it shows if camera is not allowed-->
      <div id="camera-placeholder">
        <p>Please give camera permissions to display lens</p>
        <button id="enable-camera">Enable Camera</button>
        <h3>Double Tap For Settings</h3>
      </div>
    
      <!--Camera feed of when accepted by user-->
      <video id="camera-feed" autoplay playsinline muted></video>

      <div id="camera-overlay">
        <p>Tap to capture</p>
      </div>

      <!--Flash animation-->
      <div id="flash-overlay"></div>

      <div id="settings-panel">
        <h2>Settings</h2>
      
        <!-- Sound Volume -->
        <label>
          Text Size
          <input type="range" id="text-size" min="0" max="1" step="0.1" value="1">
        </label>
      
        <br /><br />
      
        <!-- Voice Output Toggle -->
        <label>
          Voice Output
          <input type="checkbox" id="tts-toggle">
        </label>
      
        <br /><br />
      
        <!-- Voice Volume -->
        <label>
          Voice Volume
          <input type="range" id="tts-volume" min="0" max="1" step="0.1" value="1" disabled>
        </label>
      
        <br /><br />
      
        <button id="close-settings">Close</button>
      </div>

    </div>

  </div>

</body>
<script src="js/script.js"></script>
</html>
